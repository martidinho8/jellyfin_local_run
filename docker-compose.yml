name: media-local

services:
  bittorrent:
    image: lscr.io/linuxserver/qbittorrent
    restart: unless-stopped

    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: Europe/Amsterdam
      WEBUI_PORT: "8088"
      TORRENTING_PORT: "6881"

    ports:
      - "127.0.0.1:8088:8088"
      - "6881:6881"
      - "6881:6881/udp"

    volumes:
      - bittorrent_config:/config
      - "C:/docker_data/data:/data"
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    restart: unless-stopped

    environment:
      LOG_LEVEL: info
      LOG_HTML: "false"
      CAPTCHA_SOLVER: none
      TZ: Europe/Amsterdam

    ports:
      # Only needed so you can test it from Windows.
      - "127.0.0.1:8191:8191"
  jackett:
    image: lscr.io/linuxserver/jackett:latest
    container_name: jackett
    restart: unless-stopped

    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: Europe/Amsterdam
      AUTO_UPDATE: "true"

    ports:
      - "127.0.0.1:9117:9117"

    volumes:
      - jackett_config:/config

    depends_on:
      - flaresolverr

  radarr:
    image: lscr.io/linuxserver/radarr
    restart: unless-stopped

    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: Europe/Amsterdam

    ports:
      - "127.0.0.1:7878:7878"

    volumes:
      - radarr_config:/config
      - "C:/docker_data/data:/data"

    depends_on:
      - bittorrent
      - jackett

  jellyfin:
    image: jellyfin/jellyfin
    restart: unless-stopped

    ports:
      - "127.0.0.1:8096:8096"

    volumes:
      - jellyfin_config:/config
      - jellyfin_cache:/cache
      - "C:/docker_data/data:/data:ro"

  jellyseerr:
    image: fallenbagel/jellyseerr
    restart: unless-stopped

    ports:
      - "127.0.0.1:5055:5055"

    volumes:
      - jellyseerr_config:/app/config

    depends_on:
      - jellyfin
      - radarr

volumes:
  bittorrent_config:
  jackett_config:
  radarr_config:
  jellyfin_config:
  jellyfin_cache:
  jellyseerr_config: