name: media-local

services:
bittorrent:
  image: lscr.io/linuxserver/qbittorrent:latest
  restart: unless-stopped

  environment:
    PUID: "1000"
    PGID: "1000"
    TZ: Europe/Amsterdam
    WEBUI_PORT: "8088"
    TORRENTING_PORT: "6881"

  ports:
    # Web interface: only accessible from this Windows computer
    - "127.0.0.1:8088:8088"

    # Optional incoming BitTorrent connectivity
    - "6881:6881"
    - "6881:6881/udp"

  volumes:
    - bittorrent_config:/config
    - "C:/docker_data/data:/data"

radarr:
  image: lscr.io/linuxserver/radarr:latest
  restart: unless-stopped

  environment:
    PUID: "1000"
    PGID: "1000"
    TZ: Europe/Amsterdam

  ports:
    - "127.0.0.1:7878:7878"

  volumes:
    - radarr_config:/config
    - "C:/docker_data/data:/data"

  depends_on:
    - bittorrent

prowlarr:
  image: lscr.io/linuxserver/prowlarr:latest
  restart: unless-stopped

  environment:
    PUID: "1000"
    PGID: "1000"
    TZ: Europe/Amsterdam

  ports:
    - "127.0.0.1:9696:9696"

  volumes:
    - prowlarr_config:/config

  depends_on:
    - radarr

jellyfin:
  image: jellyfin/jellyfin:latest
  restart: unless-stopped

  ports:
    - "127.0.0.1:8096:8096"

  volumes:
    - jellyfin_config:/config
    - jellyfin_cache:/cache
    - "C:/docker_data/data:/data:ro"

jellyseerr:
  image: fallenbagel/jellyseerr:latest
  restart: unless-stopped

  ports:
    - "127.0.0.1:5055:5055"

  volumes:
    - jellyseerr_config:/app/config

  depends_on:
    - jellyfin
    - radarr

volumes:
  bittorrent_config:
  radarr_config:
  prowlarr_config:
  jellyfin_config:
  jellyfin_cache:
  jellyseerr_config:
