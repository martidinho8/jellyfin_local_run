
services:
bittorrent:
image: lscr.io/linuxserver/qbittorrent:latest
container_name: bittorrent
restart: unless-stopped

environment:
  PUID: "1000"
  PGID: "1000"
  TZ: Europe/Amsterdam
  WEBUI_PORT: "8088"
  TORRENTING_PORT: "6881"

ports:
  - "8088:8088"
  - "6881:6881"
  - "6881:6881/udp"

volumes:
  - bittorrent_config:/config
  - "C:/docker_data/data:/data"

healthcheck:
  test:
    - CMD-SHELL
    - curl -fsS http://127.0.0.1:8088/ >/dev/null || exit 1
  interval: 10s
  timeout: 5s
  start_period: 60s
  retries: 5

